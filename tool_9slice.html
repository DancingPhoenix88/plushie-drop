<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>9-Slice Tool</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #111;
  color: #ddd;
  font-family: 'Consolas', 'Fira Mono', monospace;
  overflow: hidden;
  height: 100dvh;
  user-select: none;
}

/* ── toolbar ──────────────────────────────────────────────────────── */
#toolbar {
  position: fixed; top:0; left:0; right:0; height:40px; z-index:200;
  background: #1c1c2a;
  border-bottom: 1px solid #2e2e44;
  display: flex; align-items: center; gap:6px; padding: 0 12px;
}

.sep { width:1px; height:24px; background:#333; margin:0 2px; flex-shrink:0; }

/* open button */
#btn-open {
  padding: 3px 10px; font: 12px/1.5 inherit;
  background: #1a2a3a; color: #7dc8f8;
  border: 1px solid #2a4a6a; border-radius: 4px; cursor: pointer;
  transition: all 0.12s; white-space: nowrap;
}
#btn-open:hover { background:#243550; }

/* filename chip */
#filename-chip {
  font-size: 11px; color: #6a8aaa;
  max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex-shrink: 0;
}

.mode-btn {
  padding: 3px 10px; font: 12px/1.5 inherit;
  background: #252535; color: #888;
  border: 1px solid #333; border-radius: 4px; cursor: pointer;
  transition: all 0.12s;
}
.mode-btn:hover { color:#ccc; border-color:#555; }
.mode-btn.active { background:#1a3a5a; color:#7dc8f8; border-color:#4a9ac8; }

#btn-edit {
  padding: 3px 10px; font: 12px/1.5 inherit;
  background:#252520; color:#aaa;
  border:1px solid #444; border-radius:4px; cursor:pointer;
  transition: all 0.12s;
}
#btn-edit:hover { color:#ccc; }
#btn-edit.active { background:#3a2a10; color:#f7c26e; border-color:#c87820; }

#btn-save {
  padding: 3px 10px; font: 12px/1.5 inherit;
  background: #102818; color:#5dc888;
  border: 1px solid #2a6a40; border-radius:4px; cursor:pointer;
  transition: all 0.12s;
}
#btn-save:hover { background:#1a3a22; }

.scale-btn {
  padding: 2px 8px; font: 14px/1.4 inherit;
  background: #252535; color: #aaa;
  border: 1px solid #333; border-radius: 4px; cursor: pointer;
}
.scale-btn:hover { color:#fff; border-color:#555; }

#info-bar {
  margin-left: auto;
  font-size: 11px; color: #556;
  white-space: nowrap;
}
#info-bar span { color: #7dc8f8; }

/* ── main canvas ──────────────────────────────────────────────────── */
#main-wrap {
  position: fixed; top:40px; left:0; right:0; bottom:0;
  overflow: hidden;
  background-color: #555;
  background-image:
    linear-gradient(45deg, #444 25%, transparent 25%),
    linear-gradient(-45deg,#444 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #444 75%),
    linear-gradient(-45deg,transparent 75%, #444 75%);
  background-size: 16px 16px;
  background-position: 0 0, 0 8px, 8px -8px, -8px 0;
}
#main { display:block; position:absolute; top:0; left:0; }

/* drop-target highlight */
#main-wrap.drag-over { outline: 3px dashed #7dc8f8; outline-offset: -3px; }

/* empty state */
#empty-state {
  position: absolute; inset:0;
  display: flex; flex-direction:column; align-items:center; justify-content:center;
  gap: 10px; pointer-events: none;
  color: #444;
}
#empty-state .big { font-size: 48px; }
#empty-state p { font-size: 13px; }

/* ── edit overlay ─────────────────────────────────────────────────── */
#edit-overlay {
  display: none;
  position: fixed; inset:40px 0 0 0; z-index:150;
  background: rgba(0,0,0,0.78);
  align-items: center; justify-content: center; flex-direction: column;
  gap: 12px;
}
#edit-overlay.show { display:flex; }

#edit-wrap {
  position: relative;
  box-shadow: 0 0 0 2px #2e2e44, 0 8px 32px rgba(0,0,0,0.7);
}

#edit-canvas { display:block; cursor:crosshair; }

#edit-meta {
  display: flex; gap:16px; font-size:12px; color:#888;
}
#edit-meta strong { font-weight:normal; }
.ev { color:#f7c26e; }

.hint { font-size:11px; color:#444; text-align:center; line-height:1.6; }

/* ── legend ──────────────────────────────────────────────────────── */
#legend {
  position:fixed; bottom:8px; right:10px; z-index:100;
  font-size:10px; color:#444;
  display:flex; flex-direction:column; align-items:flex-end; gap:2px;
}
.leg-row { display:flex; align-items:center; gap:5px; }
.leg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
</style>
</head>
<body>

<!-- hidden file input -->
<input type="file" id="file-input" accept="image/*" style="display:none" onchange="onFileInputChange(event)">

<!-- ── toolbar ──────────────────────────────────────────────────────── -->
<div id="toolbar">
  <span style="font-size:11px;color:#3a3a5a;letter-spacing:.1em">9-SLICE</span>
  <div class="sep"></div>

  <button id="btn-open" onclick="document.getElementById('file-input').click()">📂 Open Image</button>
  <span id="filename-chip">—</span>
  <div class="sep"></div>

  <button class="mode-btn active" id="btn-tile" onclick="setMode('TILE')">TILE</button>
  <button class="mode-btn"        id="btn-none" onclick="setMode('NONE')">NONE</button>
  <div class="sep"></div>

  <button id="btn-edit" onclick="toggleEdit()">✏ Edit Slices</button>
  <button id="btn-save" onclick="saveMeta()">↓ Save .meta</button>
  <div class="sep"></div>

  <span style="font-size:11px;color:#556">scale</span>
  <button class="scale-btn" onclick="adjustScale(-0.25)">−</button>
  <span id="scale-val" style="font-size:12px;color:#7dc8f8;min-width:32px;text-align:center">1×</span>
  <button class="scale-btn" onclick="adjustScale(+0.25)">+</button>

  <div id="info-bar">
    mode:<span id="ib-mode">—</span>
    &nbsp; L:<span id="ib-l">—</span>
    R:<span id="ib-r">—</span>
    T:<span id="ib-t">—</span>
    B:<span id="ib-b">—</span>
    &nbsp; <span id="ib-sz" style="color:#446">—</span>
  </div>
</div>

<!-- ── main canvas ──────────────────────────────────────────────────── -->
<div id="main-wrap">
  <canvas id="main"></canvas>
  <div id="empty-state">
    <span class="big">🖼</span>
    <p>Open an image or drag &amp; drop it here</p>
  </div>
</div>

<!-- ── edit overlay ─────────────────────────────────────────────────── -->
<div id="edit-overlay" onclick="onOverlayClick(event)">
  <div id="edit-wrap">
    <canvas id="edit-canvas"
      onmousedown="onEditDown(event)"
      onmousemove="onEditHover(event)"
      ontouchstart="onEditTouchStart(event)"
      ontouchmove="onEditTouchMove(event)"
      ontouchend="onEditTouchEnd(event)">
    </canvas>
  </div>
  <div id="edit-meta">
    L=<strong><span class="ev" id="ev-l">—</span>px</strong>
    R=<strong><span class="ev" id="ev-r">—</span>px</strong>
    T=<strong><span class="ev" id="ev-t">—</span>px</strong>
    B=<strong><span class="ev" id="ev-b">—</span>px</strong>
    &nbsp;|&nbsp; image: <span id="ev-sz" style="color:#556">—</span>
  </div>
  <div class="hint">
    drag the colored guide lines to reposition slice boundaries<br>
    click outside the image to close
  </div>
</div>

<!-- ── legend ───────────────────────────────────────────────────────── -->
<div id="legend">
  <div class="leg-row"><span class="leg-dot" style="background:#f7c26e"></span><span>L / R</span></div>
  <div class="leg-row"><span class="leg-dot" style="background:#6ef7a7"></span><span>T / B</span></div>
</div>

<script>
'use strict';

// ─── STATE ────────────────────────────────────────────────────────────────────
let img          = null;
let editOn       = false;
let currentFile  = null;   // File object of the active image
let currentBlobURL = null; // object URL for the current image
let meta = { left:12, right:12, top:12, bottom:12, mode:'TILE', scale:1 };

const DEFAULT_META = () => ({ left:12, right:12, top:12, bottom:12, mode:'TILE', scale:1 });

// ─── MAIN CANVAS ──────────────────────────────────────────────────────────────
const mainCanvas = document.getElementById('main');
const ctx        = mainCanvas.getContext('2d');
const wrap       = document.getElementById('main-wrap');

function resizeMain() {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  mainCanvas.width        = W;
  mainCanvas.height       = H;
  mainCanvas.style.width  = W + 'px';
  mainCanvas.style.height = H + 'px';
  render();
}
window.addEventListener('resize', () => { resizeMain(); if (editOn) drawEdit(); });

// ─── OPEN IMAGE ───────────────────────────────────────────────────────────────
function onFileInputChange(e) {
  const file = e.target.files[0];
  e.target.value = '';   // reset so re-selecting same file triggers change again
  if (file) loadImageFile(file);
}

function loadImageFile(file) {
  // Release previous object URL
  if (currentBlobURL) { URL.revokeObjectURL(currentBlobURL); currentBlobURL = null; }

  currentFile = file;
  const lsKey = 'nslice_meta_' + file.name;

  // Load meta: localStorage first, then fall back to server fetch, then defaults
  const saved = localStorage.getItem(lsKey);
  if (saved) {
    try { meta = { ...DEFAULT_META(), ...JSON.parse(saved) }; }
    catch { meta = DEFAULT_META(); }
    finishLoad(file);
  } else {
    // Try to fetch a sibling .meta file from the server (works when served locally)
    fetch(file.name + '.meta')
      .then(r => r.ok ? r.json() : null)
      .catch(() => null)
      .then(data => {
        meta = data ? { ...DEFAULT_META(), ...data } : DEFAULT_META();
        finishLoad(file);
      });
  }
}

function finishLoad(file) {
  currentBlobURL = URL.createObjectURL(file);
  const newImg   = new Image();
  newImg.onload  = () => {
    img = newImg;
    clearPatCache();
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('filename-chip').textContent = file.name;
    document.title = `9-Slice — ${file.name}`;
    setMode(meta.mode, false);
    updateScaleUI();
    updateInfoBar();
    resizeMain();
    if (editOn) drawEdit();
  };
  newImg.onerror = () => {
    alert('Could not load image: ' + file.name);
  };
  newImg.src = currentBlobURL;
}

// ─── DRAG & DROP ──────────────────────────────────────────────────────────────
wrap.addEventListener('dragover', e => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  wrap.classList.add('drag-over');
});
wrap.addEventListener('dragleave', e => {
  if (!wrap.contains(e.relatedTarget)) wrap.classList.remove('drag-over');
});
wrap.addEventListener('drop', e => {
  e.preventDefault();
  wrap.classList.remove('drag-over');
  const file = [...e.dataTransfer.files].find(f => f.type.startsWith('image/'));
  if (file) loadImageFile(file);
});

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  if (!img?.complete || !img.naturalWidth) return;
  const W = mainCanvas.width, H = mainCanvas.height;
  ctx.clearRect(0, 0, W, H);
  switch (meta.mode) {
    case 'NONE': renderNone(W, H); break;
    case 'TILE': renderTile(W, H); break;
  }
}

function renderNone(W, H) {
  ctx.drawImage(img, 0, 0, W, H);
}

// ─── TILE MODE ────────────────────────────────────────────────────────────────
const _patCache = new Map();
function clearPatCache() { _patCache.clear(); }

// Creates (and caches) a tile stamp at srcW*scale × srcH*scale.
function getPattern(srcX, srcY, srcW, srcH, scale) {
  const key = `${srcX}|${srcY}|${srcW}|${srcH}|${scale}`;
  if (_patCache.has(key)) return _patCache.get(key);
  const tw = Math.max(1, Math.round(srcW * scale));
  const th = Math.max(1, Math.round(srcH * scale));
  const oc = document.createElement('canvas');
  oc.width = tw; oc.height = th;
  oc.getContext('2d').drawImage(img, srcX, srcY, srcW, srcH, 0, 0, tw, th);
  const pat = ctx.createPattern(oc, 'repeat');
  _patCache.set(key, pat);
  return pat;
}

// Fills dest rect by repeating the source region at scale × natural size.
function tileFill(ddx, ddy, ddw, ddh, srcX, srcY, srcW, srcH, scale) {
  if (srcW <= 0 || srcH <= 0 || ddw <= 0 || ddh <= 0) return;
  const pat = getPattern(srcX, srcY, srcW, srcH, scale);
  ctx.save();
  ctx.beginPath();
  ctx.rect(ddx, ddy, ddw, ddh);
  ctx.clip();
  pat.setTransform(new DOMMatrix().translate(ddx, ddy));
  ctx.fillStyle = pat;
  ctx.fillRect(ddx, ddy, ddw, ddh);
  ctx.restore();
}

function renderTile(W, H) {
  const { left:L, right:R, top:T, bottom:B, scale:S } = meta;
  const sw = img.naturalWidth, sh = img.naturalHeight;
  const mSW = sw - L - R, mSH = sh - T - B;
  const sL = L*S, sR = R*S, sT = T*S, sB = B*S;
  const mDW = W - sL - sR, mDH = H - sT - sB;

  // corners — drawn at S× natural size, no tiling
  ctx.drawImage(img, 0,    0,    L, T, 0,      0,      sL, sT);
  ctx.drawImage(img, sw-R, 0,    R, T, W-sR,   0,      sR, sT);
  ctx.drawImage(img, 0,    sh-B, L, B, 0,      H-sB,   sL, sB);
  ctx.drawImage(img, sw-R, sh-B, R, B, W-sR,   H-sB,   sR, sB);

  // edges — tile stamp is S× natural size; repeat to fill remaining area
  tileFill(sL,   0,    mDW, sT,  L,    0,    mSW, T,   S);
  tileFill(sL,   H-sB, mDW, sB,  L,    sh-B, mSW, B,   S);
  tileFill(0,    sT,   sL,  mDH, 0,    T,    L,   mSH, S);
  tileFill(W-sR, sT,   sR,  mDH, sw-R, T,    R,   mSH, S);

  // center — tile stamp S× in both axes
  tileFill(sL, sT, mDW, mDH, L, T, mSW, mSH, S);
}

// ─── SCALE CONTROL ────────────────────────────────────────────────────────────
function adjustScale(delta) {
  meta.scale = Math.max(0.25, Math.round((meta.scale + delta) * 100) / 100);
  clearPatCache();
  updateScaleUI();
  render();
}

function updateScaleUI() {
  const s = meta.scale;
  document.getElementById('scale-val').textContent =
    (s === Math.floor(s) ? s : s.toFixed(2)) + '×';
}

// ─── MODE CONTROL ─────────────────────────────────────────────────────────────
function setMode(m, doRender = true) {
  meta.mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('btn-' + m.toLowerCase());
  if (el) el.classList.add('active');
  updateInfoBar();
  if (doRender) render();
}

// ─── INFO BAR ─────────────────────────────────────────────────────────────────
function updateInfoBar() {
  const { left:L, right:R, top:T, bottom:B, mode:M, scale:S } = meta;
  document.getElementById('ib-mode').textContent = M;
  document.getElementById('ib-l').textContent = L;
  document.getElementById('ib-r').textContent = R;
  document.getElementById('ib-t').textContent = T;
  document.getElementById('ib-b').textContent = B;
  if (img?.naturalWidth)
    document.getElementById('ib-sz').textContent =
      `${img.naturalWidth}×${img.naturalHeight}  corners@${Math.round(L*S)}×${Math.round(T*S)}px`;
}

// ─── EDIT OVERLAY ─────────────────────────────────────────────────────────────
const editOverlay = document.getElementById('edit-overlay');
const editCanvas  = document.getElementById('edit-canvas');
const ectx        = editCanvas.getContext('2d');

let editScale  = 1;
let activeDrag = null;

function toggleEdit() {
  if (!img?.naturalWidth) return;
  editOn = !editOn;
  document.getElementById('btn-edit').classList.toggle('active', editOn);
  editOverlay.classList.toggle('show', editOn);
  if (editOn) { drawEdit(); } else { render(); }
}

function onOverlayClick(e) {
  if (e.target === editOverlay) toggleEdit();
}

function drawEdit() {
  if (!img?.naturalWidth) return;
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const maxW = Math.min(window.innerWidth  - 80, 640);
  const maxH = Math.min(window.innerHeight - 160, 640);
  editScale   = Math.min(4, maxW / iw, maxH / ih);
  const cw    = Math.round(iw * editScale);
  const ch    = Math.round(ih * editScale);

  editCanvas.width  = cw; editCanvas.height  = ch;
  editCanvas.style.width  = cw + 'px'; editCanvas.style.height = ch + 'px';

  ectx.clearRect(0, 0, cw, ch);
  const chkPat = makeChecker(ectx, 8, '#666', '#555');
  ectx.fillStyle = chkPat; ectx.fillRect(0, 0, cw, ch);
  ectx.drawImage(img, 0, 0, cw, ch);

  const { left:L, right:R, top:T, bottom:B } = meta;
  const x1 = L * editScale, x2 = (iw - R) * editScale;
  const y1 = T * editScale, y2 = (ih - B) * editScale;

  // tint corners
  ectx.save();
  ectx.fillStyle = 'rgba(0,0,0,0.28)';
  ectx.fillRect(0,  0,  x1,     y1    );
  ectx.fillRect(x2, 0,  cw-x2,  y1    );
  ectx.fillRect(0,  y2, x1,     ch-y2 );
  ectx.fillRect(x2, y2, cw-x2,  ch-y2 );
  ectx.restore();

  const guides = [
    { id:'L', isVert:true,  pos:x1, color:'#f7c26e', label:`L=${L}px`,  lx:x1+5,  ly:14    },
    { id:'R', isVert:true,  pos:x2, color:'#f7c26e', label:`R=${R}px`,  lx:x2+5,  ly:28    },
    { id:'T', isVert:false, pos:y1, color:'#6ef7a7', label:`T=${T}px`,  lx:4,     ly:y1-5  },
    { id:'B', isVert:false, pos:y2, color:'#6ef7a7', label:`B=${B}px`,  lx:4,     ly:y2-5  },
  ];

  for (const g of guides) {
    ectx.save();
    ectx.strokeStyle = g.color;
    ectx.lineWidth   = activeDrag === g.id ? 2.5 : 1.5;
    ectx.setLineDash([5, 4]);
    ectx.beginPath();
    if (g.isVert) { ectx.moveTo(g.pos, 0); ectx.lineTo(g.pos, ch); }
    else          { ectx.moveTo(0, g.pos); ectx.lineTo(cw, g.pos); }
    ectx.stroke(); ectx.setLineDash([]);
    ectx.fillStyle = g.color;
    ectx.font = 'bold 11px Consolas, monospace';
    ectx.fillText(g.label, g.lx, g.ly);
    const hx = g.isVert ? g.pos : cw/2;
    const hy = g.isVert ? ch/2  : g.pos;
    ectx.beginPath(); ectx.arc(hx, hy, activeDrag === g.id ? 7 : 5, 0, Math.PI*2);
    ectx.fillStyle = g.color; ectx.fill();
    ectx.strokeStyle = '#111'; ectx.lineWidth = 1; ectx.stroke();
    ectx.restore();
  }

  document.getElementById('ev-l').textContent = L;
  document.getElementById('ev-r').textContent = R;
  document.getElementById('ev-t').textContent = T;
  document.getElementById('ev-b').textContent = B;
  document.getElementById('ev-sz').textContent = `${iw} × ${ih}`;
}

function makeChecker(gctx, size, c1, c2) {
  const oc = document.createElement('canvas');
  oc.width = oc.height = size * 2;
  const oc2 = oc.getContext('2d');
  oc2.fillStyle = c1; oc2.fillRect(0, 0, size*2, size*2);
  oc2.fillStyle = c2; oc2.fillRect(0, 0, size, size); oc2.fillRect(size, size, size, size);
  return gctx.createPattern(oc, 'repeat');
}

// ── hit / drag ────────────────────────────────────────────────────────────────
const HIT_PX = 10;
function hitGuide(cx, cy) {
  const { left:L, right:R, top:T, bottom:B } = meta;
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const x1 = L * editScale, x2 = (iw - R) * editScale;
  const y1 = T * editScale, y2 = (ih - B) * editScale;
  if (Math.abs(cx - x1) < HIT_PX) return 'L';
  if (Math.abs(cx - x2) < HIT_PX) return 'R';
  if (Math.abs(cy - y1) < HIT_PX) return 'T';
  if (Math.abs(cy - y2) < HIT_PX) return 'B';
  return null;
}

function applyDrag(id, cx, cy) {
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const px = Math.max(0, Math.min(cx, editCanvas.width))  / editScale;
  const py = Math.max(0, Math.min(cy, editCanvas.height)) / editScale;
  const { left:L, right:R, top:T, bottom:B } = meta;
  const MIN = 1;
  if (id === 'L') meta.left   = Math.max(MIN, Math.min(Math.round(px),    iw - R - MIN));
  if (id === 'R') meta.right  = Math.max(MIN, Math.min(Math.round(iw-px), iw - L - MIN));
  if (id === 'T') meta.top    = Math.max(MIN, Math.min(Math.round(py),    ih - B - MIN));
  if (id === 'B') meta.bottom = Math.max(MIN, Math.min(Math.round(ih-py), ih - T - MIN));
  clearPatCache();
}

// ── mouse ─────────────────────────────────────────────────────────────────────
function editXY(e) {
  const r = editCanvas.getBoundingClientRect();
  return [e.clientX - r.left, e.clientY - r.top];
}
function onEditDown(e) {
  e.preventDefault();
  activeDrag = hitGuide(...editXY(e));
}
function onEditHover(e) {
  const [cx, cy] = editXY(e);
  if (activeDrag) { applyDrag(activeDrag, cx, cy); updateInfoBar(); render(); drawEdit(); return; }
  const hit = hitGuide(cx, cy);
  editCanvas.style.cursor = hit === 'L' || hit === 'R' ? 'ew-resize'
                           : hit === 'T' || hit === 'B' ? 'ns-resize' : 'crosshair';
}
window.addEventListener('mouseup',   () => { activeDrag = null; });
window.addEventListener('mousemove', e  => {
  if (!editOn || !activeDrag) return;
  const r = editCanvas.getBoundingClientRect();
  applyDrag(activeDrag, e.clientX - r.left, e.clientY - r.top);
  updateInfoBar(); render(); drawEdit();
});

// ── touch ─────────────────────────────────────────────────────────────────────
function touchXY(e) {
  const t = e.touches[0], r = editCanvas.getBoundingClientRect();
  return [t.clientX - r.left, t.clientY - r.top];
}
function onEditTouchStart(e) { e.preventDefault(); activeDrag = hitGuide(...touchXY(e)); }
function onEditTouchMove(e) {
  if (!activeDrag) return; e.preventDefault();
  applyDrag(activeDrag, ...touchXY(e));
  updateInfoBar(); render(); drawEdit();
}
function onEditTouchEnd() { activeDrag = null; }

// ─── SAVE .meta ───────────────────────────────────────────────────────────────
async function saveMeta() {
  if (!currentFile) return;
  const data    = JSON.stringify(meta, null, 2);
  const sugName = currentFile.name + '.meta';
  const btn     = document.getElementById('btn-save');

  // Always persist to localStorage so it's remembered on next open
  localStorage.setItem('nslice_meta_' + currentFile.name, data);

  // Try File System Access API for a real file save
  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: sugName,
        types: [{ description: '9-Slice Meta (JSON)', accept: { 'application/json': ['.meta'] } }],
      });
      const writable = await handle.createWritable();
      await writable.write(data); await writable.close();
      flash(btn, '✓ Saved!', 1800);
      return;
    } catch (err) {
      if (err.name !== 'AbortError') console.warn('showSaveFilePicker failed:', err);
    }
  }

  // Fallback: browser download
  const a = document.createElement('a');
  a.href     = 'data:application/json;charset=utf-8,' + encodeURIComponent(data);
  a.download = sugName;
  a.click();
  flash(btn, '↓ Downloaded', 1800);
}

function flash(el, text, ms) {
  const orig = el.textContent;
  el.textContent = text;
  setTimeout(() => { el.textContent = orig; }, ms);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
resizeMain();
</script>
</body>
</html>
